name: Build Android APK

# Only runs when mobile-related files change, so regular web-only pushes
# don't trigger an Android rebuild.
on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install mobile deps
        working-directory: mobile
        run: npm install

      - name: Add Android platform if missing
        working-directory: mobile
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # Restore Firebase config from the repo secret so FCM works in release.
      # Set this secret in GitHub → Settings → Secrets: GOOGLE_SERVICES_JSON
      - name: Write google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        working-directory: mobile
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Sync web assets into native project
        working-directory: mobile
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akhiyan-admin-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
